---
# Execute the below Trident protect role to execute common tasks for both Backup/Restore and Snapshot/Restore scenarios.
- name: Execute Trident protect common tasks
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/trident_protect_common, tags: [ 'trident_protect_common' ] }
  tags:
  - tp_common_tasks

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_common_tasks
# Ensure that the vars/trident_protect_main.yml file is updated with the desired configuration before executing the playbook.

# For Backup and Restore scenario tasks, execute the below playbook:
- name: Execute Backup and Restore scenario tasks
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/backup_and_restore_scenario, tags: [ 'backup_and_restore_scenario' ] }
  tags:
  - tp_backup_and_restore_tasks

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_backup_and_restore_tasks

# Execute the below role to create Snapshot schedules for VMs in OpenShift Virtualization using Trident protect.
- name: Execute tasks for Snapshot schedules of VMs
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/create_snapshot_schedule, tags: [ 'create_snapshot_schedule' ] }
  tags:
  - tp_snapshot_schedule_tasks

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_snapshot_schedule_tasks

# Make sure the snapshot schedule has created at least one snapshot before proceeding to the Snapshot and Restore scenario tasks.
# For Snapshot and Restore scenario tasks, execute the below playbook:
- name: Execute Snapshot and Restore scenario tasks
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/snapshot_and_restore_scenario, tags: [ 'snapshot_and_restore_scenario' ] }
  tags:
  - tp_snapshot_and_restore_tasks

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_snapshot_and_restore_tasks

# Execute the below Trident protect roles to execute Disaster Recovery (DR) scenario tasks.
# These consist of roles to configure AMR, failover and failback of VMs in OpenShift Virtualization using Trident protect and SnapMirror.

# Step 1: Set up prerequisites for AppMirrorRelationship (AMR) on both source and destination clusters
# This includes creating secrets, AppVaults, Applications, and Snapshots
- name: Execute Disaster Recovery AMR Prerequisites tasks
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/dr_amr_prerequisites, tags: [ 'dr_amr_prerequisites' ] }
  tags:
  - tp_disaster_recovery_amr_prerequisites

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_disaster_recovery_amr_prerequisites

# Important: If using scheduled snapshots, wait for the schedule to create at least one snapshot before proceeding to the next step.
# You can verify snapshot creation by checking the Snapshot resources in the source namespace.

# Step 2: Create AppMirrorRelationship (AMR) to establish VM replication between source and destination OpenShift clusters
# This should be executed AFTER prerequisites are complete and snapshots are available
- name: Execute Disaster Recovery AMR Configuration tasks
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/dr_amr_config, tags: [ 'dr_amr_config' ] }
  tags:
  - tp_disaster_recovery_amr_config

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_disaster_recovery_amr_config

# Step 3: Failover to destination OpenShift cluster in case of disaster on source cluster
# This should be executed AFTER the AMR is in Established state with successful replication and a disaster has occurred on the source cluster
- name: Execute Disaster Recovery Failover tasks
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/dr_failover, tags: [ 'dr_failover' ] }
  tags:
  - tp_disaster_recovery_failover

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_disaster_recovery_failover

# Step 4: Prerequisites to reverse resync the failed over replication relationship. 
# This should be executed after failover is complete and the failed over VMs are running successfully on the destination cluster.
- name: Execute Disaster Recovery Reverse Resync the failed over replication relationship Prerequisites tasks
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/dr_reverse_resync_prerequisites, tags: [ 'dr_reverse_resync_prerequisites' ] }
  tags:
  - tp_disaster_recovery_reverse_resync_prerequisites

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_disaster_recovery_reverse_resync_prerequisites

# Step 5: Reverse resync the failed over replication relationship to re-establish replication from the new primary (destination cluster) back to the original primary (source cluster).
# This should be executed after the reverse resync prerequisites are complete and the failed over VMs are running successfully on the destination cluster.
- name: Execute Disaster Recovery Reverse Resync the failed over replication relationship tasks
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/dr_reverse_resync_config, tags: [ 'dr_reverse_resync_config' ] }
  tags:
  - tp_disaster_recovery_reverse_resync_config

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_disaster_recovery_reverse_resync_config

# Step 6: Promote the AppMirrorRelationship on the new destination cluster (original source cluster) to initiate the failback of VMs.
# This should be executed after the reverse resync is complete and replication from destination to source is confirmed healthy.
- name: Execute Disaster Recovery tasks to promote the AMR to initiate failback of VMs to the original primary (source cluster)
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/dr_failback_promote, tags: [ 'dr_failback_promote' ] }
  tags:
  - tp_disaster_recovery_failback_promote

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_disaster_recovery_failback_promote

# Step 7: Prepare the system so that forward replication from the original primary (source cluster) to the destination cluster can be re-established.
# This should be executed after the AMR promotion is complete and the AppMirrorRelationship on the new destination cluster (original source cluster) is in Promoted state.
- name: Execute Disaster Recovery tasks to prepare the system for re-establishing forward replication from the original primary (source cluster) to the destination cluster
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/dr_failback_prepare_forward_amr, tags: [ 'dr_failback_prepare_forward_amr' ] }
  tags:
  - tp_disaster_recovery_failback_prepare_forward_amr

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_disaster_recovery_failback_prepare_forward_amr

# Step 8: Re-establish forward replication from the original primary (source cluster) to the destination cluster.
# This should be executed after the failback preparation tasks are complete and the AppMirrorRelationship on the new destination cluster (original source cluster) is in Promoted state.
- name: Execute Disaster Recovery tasks to re-establish replication from the original primary (source cluster) to the destination cluster
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/trident_protect_main.yml
  connection: local
  roles:
  - { role: trident-protect/dr_failback_establish_forward_amr, tags: [ 'dr_failback_establish_forward_amr' ] }
  tags:
  - tp_disaster_recovery_failback_establish_forward_amr

# Note: To execute this playbook, run the following command from the directory where this file is located:
# ansible-playbook Setup_Trident_Protect_tasks.yml -e @vars/trident_protect_main.yml -t tp_disaster_recovery_failback_establish_forward_amr