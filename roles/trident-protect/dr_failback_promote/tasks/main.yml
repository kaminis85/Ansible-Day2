---
# Ansible tasks to promote the AppMirrorRelationship on the new destination cluster (original source cluster) to initiate the failback of VMs in a Disaster Recovery scenario using NetApp Trident Protect and SnapMirror.
# This role should be executed AFTER the dr_reverse_resync_config role has been executed and the reverse resync is in Established state with healthy replication from destination to source cluster.
# Make sure the original source cluster is ready to take over as primary again and execute any necessary cleanup tasks on the destination cluster before running this role.

# Disable protection schedules for the VM on the source (original destination) cluster to prevent any replication activities during the failback preparation process.
- name: Disable protection schedules for the VM on the source (original destination) cluster
  kubernetes.core.k8s:
    kind: Schedule
    api_version: protect.trident.netapp.io/v1
    state: absent
    name: "{{ src_snapshot_schedule_specs.name }}"
    namespace: "{{ dst_vm_namespace }}"
    host: "{{ dst_oc_api_url }}"
    api_key: "{{ dst_oc_api_token }}"
    validate_certs: false
  tags:
    - dr_failback_prepare
    - new_dst_amr_promote

# Verify that the protection schedules have been successfully disabled for the VM on the source (original destination) cluster before proceeding with any further failback preparation tasks.
- name: Verify protection schedules are disabled for the VM on the source (original destination) cluster
  kubernetes.core.k8s_info:
    kind: Schedule
    api_version: protect.trident.netapp.io/v1
    name: "{{ src_snapshot_schedule_specs.name }}"
    namespace: "{{ dst_vm_namespace }}"
    host: "{{ dst_oc_api_url }}"
    api_key: "{{ dst_oc_api_token }}"
    validate_certs: false
  register: dst_schedule_info
  failed_when: dst_schedule_info.resources | length > 0
  tags:
    - dr_failback_prepare
    - new_dst_amr_promote

# Create a shutdown snapshot on the source (original destination) cluster to capture the final state of the VM before failback. This snapshot will be used as the source for the failback process to restore the VM back to the original source cluster.
- name: Create a shutdown snapshot on the source (original destination) cluster for failback
  kubernetes.core.k8s:
    state: present
    host: "{{ dst_oc_api_url }}"
    api_key: "{{ dst_oc_api_token }}"
    validate_certs: false
    definition:
      apiVersion: protect.trident.netapp.io/v1
      kind: ShutdownSnapshot
      metadata:
        name: "{{ shutdown_snapshot_name }}"
        namespace: "{{ dst_vm_namespace }}"
      spec:
        appVaultRef: "{{ dst_appvault_name }}"
        applicationRef: "{{ src_application_name }}"
  tags:
    - dr_failback_prepare
    - new_dst_amr_promote

# Verify that the shutdown snapshot has been successfully created on the source (original destination) cluster before proceeding with the failback process.
- name: Verify shutdown snapshot creation on the source (original destination) cluster
  kubernetes.core.k8s_info:
    kind: ShutdownSnapshot
    api_version: protect.trident.netapp.io/v1
    name: "{{ shutdown_snapshot_name }}"
    namespace: "{{ dst_vm_namespace }}"
    host: "{{ dst_oc_api_url }}"
    api_key: "{{ dst_oc_api_token }}"
    validate_certs: false
  register: shutdown_snapshot_verify_info
  until: >
    shutdown_snapshot_verify_info.resources | length > 0 and
    shutdown_snapshot_verify_info.resources[0].status is defined and
    shutdown_snapshot_verify_info.resources[0].status.appArchivePath | default('') != ''
  retries: 30
  delay: 10
  failed_when: >
    shutdown_snapshot_verify_info.resources | length == 0 or
    shutdown_snapshot_verify_info.resources[0].status.appArchivePath | default('') == ''
  tags:
    - dr_failback_prepare
    - new_dst_amr_promote

# Capture the basename (last part after the final slash) from appArchivePath of the shutdown snapshot
- name: Set basename fact from appArchivePath of the created shutdown snapshot
  set_fact:
    shutdown_snapshot_basename: "{{ shutdown_snapshot_verify_info.resources[0].status.appArchivePath.split('/')[-1] }}"
  tags:
    - dr_failback_prepare
    - new_dst_amr_promote

# Fetch the source application UID from the source OpenShift cluster (original destination cluster)
- name: Get source application UID from the source OpenShift cluster (original destination cluster) for AMR promotion on the new destination cluster (original source cluster)
  kubernetes.core.k8s_info:
    kind: Application
    api_version: protect.trident.netapp.io/v1
    name: "{{ src_application_name }}"
    namespace: "{{ dst_vm_namespace }}"
    host: "{{ dst_oc_api_url }}"
    api_key: "{{ dst_oc_api_token }}"
    validate_certs: false
  register: new_src_application_info
  changed_when: false
  failed_when: new_src_application_info.resources | length == 0
  tags:
    - dr_failback_prepare
    - new_dst_amr_promote

# Extract the source application UID
- name: Set source application UID as fact for AMR promotion on the new destination cluster (original source cluster)
  ansible.builtin.set_fact:
    src_application_uid: "{{ new_src_application_info.resources[0].metadata.uid }}"
  tags:
    - dr_failback_prepare
    - new_dst_amr_promote

# Perform a fail over to the destination (original source) cluster using the ShutdownSnapshot as the promoted snapshot.
- name: Perform failover to the destination (original source) cluster using the ShutdownSnapshot as the promoted snapshot
  kubernetes.core.k8s:
    state: present
    host: "{{ src_oc_api_url }}"
    api_key: "{{ src_oc_api_token }}"
    validate_certs: false
    wait: false
    definition:
      apiVersion: protect.trident.netapp.io/v1
      kind: AppMirrorRelationship
      metadata:
        name: "{{ appmirrorrelationship_specs.name }}"
        namespace: "{{ src_vm_namespace }}"
      spec:
        desiredState: "Promoted"
        promotedSnapshot: "{{ shutdown_snapshot_basename }}"
        destinationAppVaultRef: "{{ src_appvault_name }}"
        sourceAppVaultRef: "{{ dst_appvault_name }}"
        sourceApplicationName: "{{ src_application_name }}"
        sourceApplicationUID: "{{ src_application_uid }}"
        storageClassName: "{{ appmirrorrelationship_specs.storage_class }}"
        namespaceMapping:
          - destination: "{{ src_vm_namespace }}"
            source: "{{ dst_vm_namespace }}"
        recurrenceRule: |-
          DTSTART:{{ appmirrorrelationship_specs.recurrence_rule.dtstart }}
          RRULE:{{ appmirrorrelationship_specs.recurrence_rule.rrule }}
  tags:
    - new_dst_amr_promote

# View the AppMirrorRelationship details on the new destination OpenShift cluster (original source cluster)
- name: Get AppMirrorRelationship details to verify promotion on the new destination OpenShift cluster (original source cluster)
  kubernetes.core.k8s_info:
    kind: AppMirrorRelationship
    api_version: protect.trident.netapp.io/v1
    name: "{{ appmirrorrelationship_specs.name }}"
    namespace: "{{ src_vm_namespace }}"
    host: "{{ src_oc_api_url }}"
    api_key: "{{ src_oc_api_token }}"
    validate_certs: false
  register: new_dst_appmirrorrelationship_info
  changed_when: false
  retries: 10
  delay: 10
  until: new_dst_appmirrorrelationship_info.resources | length > 0
  failed_when: new_dst_appmirrorrelationship_info.resources | length == 0
  tags:
    - new_dst_amr_promote

# Display the AppMirrorRelationship details promoted on the new destination OpenShift cluster (original source cluster)
- name: Display AppMirrorRelationship information promoted in {{ src_vm_namespace }} namespace on the new destination OpenShift cluster (original source cluster)
  ansible.builtin.debug:
    var: new_dst_appmirrorrelationship_info.resources[0]
  tags:
    - new_dst_amr_promote

# Wait for the AppMirrorRelationship to reach the Promoted state
- name: Wait for AppMirrorRelationship {{ appmirrorrelationship_specs.name }} to reach Promoted state
  kubernetes.core.k8s_info:
    kind: AppMirrorRelationship
    api_version: protect.trident.netapp.io/v1
    name: "{{ appmirrorrelationship_specs.name }}"
    namespace: "{{ src_vm_namespace }}"
    host: "{{ src_oc_api_url }}"
    api_key: "{{ src_oc_api_token }}"
    validate_certs: false
  register: new_dst_amr_state
  until: >
    new_dst_amr_state.resources | length > 0 and
    new_dst_amr_state.resources[0].status.state is defined and
    new_dst_amr_state.resources[0].status.state == "Promoted"
  retries: 60
  delay: 30
  changed_when: false
  tags:
    - new_dst_amr_promote

# Display the AppMirrorRelationship state after promotion
- name: Display AppMirrorRelationship state after reaching Promoted
  ansible.builtin.debug:
    msg: "AppMirrorRelationship '{{ appmirrorrelationship_specs.name }}' is now in '{{ new_dst_amr_state.resources[0].status.state }}' state"
  when: new_dst_amr_state.resources | length > 0 and new_dst_amr_state.resources[0].status.state is defined
  tags:
    - new_dst_amr_promote